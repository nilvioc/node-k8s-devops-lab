name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-publish-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Testes
        run: npm test

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nilvioc/node-k8s-devops-lab:latest
            nilvioc/node-k8s-devops-lab:${{ github.sha }}

      - name: Configurar kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy Kubernetes
        run: |
          kubectl set image deployment/node-lab \
          node-k8s-devops-lab=nilvioc/node-k8s-devops-lab:latest \
          -n devops-lab

          kubectl rollout status deployment/node-lab -n devops-lab
